<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ДОМ НЕОНА | Финансы</title>
  <link rel="icon" type="image/png" href="../../shared/assets/dom-neon-logo.png" />
  <link href="./app.css?v=20260429-finance-rebuild-2" rel="stylesheet" />
</head>
<body>
  <main class="finance-shell">
    <section class="finance-app-header">
      <div>
        <h1>Финансы</h1>
        <p id="userLabel">Загружаю пользователя...</p>
        <span class="save-indicator" id="saveLabel">Загрузка...</span>
      </div>
      <div class="actions">
        <button type="button" id="dictionariesButton">Справочники</button>
        <button type="button" id="addRowButton">+ Строка</button>
        <button type="button" id="deleteRowsButton">Удалить выбранные</button>
        <button type="button" id="saveButton" class="primary">Сохранить</button>
      </div>
    </section>

    <nav class="finance-tabs" id="tabs">
      <button class="tab active" type="button" data-view="overview">Обзор</button>
      <button class="tab" type="button" data-view="balance">Баланс</button>
      <button class="tab" type="button" data-view="calendar">Платежный календарь</button>
      <button class="tab" type="button" data-view="metrics">Метрики</button>
    </nav>

    <section class="notice" id="statusBox">Загружаю данные из ЛАЙТ 2...</section>

    <section class="overview-grid" id="overviewView"></section>

    <section class="sheet-tools" id="sheetTools" hidden>
      <label>
        Поиск
        <input id="searchInput" type="search" placeholder="Сумма, статья, контрагент, комментарий..." />
      </label>
      <label>
        Показать
        <select id="rowLimitInput">
          <option value="100">100 строк</option>
          <option value="250">250 строк</option>
          <option value="500">500 строк</option>
          <option value="all">Все строки</option>
        </select>
      </label>
      <span id="sheetMeta"></span>
    </section>

    <section class="sheet-card" id="sheetView" hidden>
      <div class="table-wrap" id="tableWrap"></div>
    </section>
  </main>

  <dialog id="dictionariesDialog">
    <form method="dialog" class="dialog-card">
      <header>
        <div>
          <h2>Справочники</h2>
          <p>Выпадающие списки для баланса, платежного календаря и метрик.</p>
        </div>
        <button value="close" type="submit" class="icon-button">×</button>
      </header>
      <div id="dictionariesGrid" class="dictionary-grid"></div>
    </form>
  </dialog>

  <script type="module" src="./app.js?v=20260429-finance-rebuild-2"></script>
</body>
</html>
