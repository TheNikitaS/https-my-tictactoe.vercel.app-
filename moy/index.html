function inferPricingKind(item) {
    if (item.category === 'Материалы' && item.subcategory === 'Производство подложки') return 'assembly';
    if (item.category === 'Материалы') return 'goods';
    if (item.subcategory === 'Дизайн макета') return 'design';
    if (item.subcategory === 'Сборка') return 'assembly';

    return 'pass';
}

function normalizeCatalog(rawCatalog) {
    const savedItems = Array.isArray(rawCatalog) ? rawCatalog : [];
    const savedMap = new Map(savedItems.filter((item) => item?.id).map((item) => [item.id, item]));
    const catalog = BASE_CATALOG.map((item) => {
        const saved = savedMap.get(item.id) || {};
        return {
            ...item,
            ...saved,
            cost: Number(saved.cost ?? item.cost) || 0,
            hidden: Boolean(saved.hidden),
            deleted: Boolean(saved.deleted),
            custom: false,
            pricingKind: saved.pricingKind || item.pricingKind || inferPricingKind(item)
        };
    });

    savedItems
        .filter((item) => item?.id && !savedMap.has(`__${item.id}`) && !BASE_CATALOG.some((base) => base.id === item.id))
        .forEach((item) => {
            catalog.push({
                ...item,
                cost: Number(item.cost) || 0,
                hidden: Boolean(item.hidden),
                deleted: Boolean(item.deleted),
                custom: true,
                pricingKind: item.pricingKind || 'goods'
            });
        });

    return catalog;
}

function getActiveTab() {
    return state.tabs.find((tab) => tab.id === state.activeTabId) || null;
}

function getActiveCatalog() {
    return getActiveTab()?.data?.catalog || cloneCatalog();
}

function iconMarkup(type) {
    if (type === 'hide') {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/><circle cx="12" cy="12" r="3.2"/></svg>';
    }
    if (type === 'copy') {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><rect x="4" y="4" width="11" height="11" rx="2"/></svg>';
    }
    if (type === 'done') {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
    }
    if (type === 'trash') {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>';
    }
    return '';
}

function escapeHtml(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function syncCatalogFromDom(activeTab) {
    if (!activeTab?.data?.catalog) return;
    const catalogById = new Map(activeTab.data.catalog.map((item) => [item.id, item]));
    document.querySelectorAll('.item-row[data-item-id]').forEach((row) => {
        const itemId = row.dataset.itemId;
        const item = catalogById.get(itemId);
        if (!item) return;
        const costInput = row.querySelector('.cost-input');
        item.cost = Number(costInput?.value) || 0;
    });
}

function cloneState(value) {
    return JSON.parse(JSON.stringify(value));
}

function persistLocalState(nextState = state) {
    localStorage.setItem(sessionKey, JSON.stringify(nextState));
}

function setSyncStatus(text, isError = false) {
    const el = document.getElementById('sync-status');
    if (!el) return;
    el.textContent = text;
    el.style.color = isError ? '#c0392b' : '#6c757d';
}

function createDefaultState() {
    const defaultTab = { id: 'tab1', name: 'Вывеска 1', data: createTabData(), hidden: false };
    return { activeTabId: 'tab1', tabs: [defaultTab], nextTabNum: 2, lastEditedAt: 0 };
}

function normalizeState(rawState) {
    const fallback = createDefaultState();
    const base = rawState && typeof rawState === 'object' ? rawState : fallback;
    const tabs = Array.isArray(base.tabs) && base.tabs.length
        ? base.tabs.map((tab, index) => ({
            id: tab?.id || `tab${index + 1}`,
            name: (String(tab?.name || '').trim() || `Вывеска ${index + 1}`),
            data: createTabData(tab?.data),
            hidden: !!tab?.hidden
        }))
        : fallback.tabs;

    if (!tabs.some(tab => !tab.hidden)) {
        tabs[0].hidden = false;
    }

    const visibleTabs = tabs.filter(tab => !tab.hidden);
    const activeTabId = visibleTabs.some(tab => tab.id === base.activeTabId)
        ? base.activeTabId
        : visibleTabs[0].id;

    return {
        activeTabId,
        tabs,
        nextTabNum: Math.max(Number(base.nextTabNum) || 2, tabs.length + 1),
        lastEditedAt: Number(base.lastEditedAt) || 0
    };
}

function touchState(nextState = state) {
    nextState.lastEditedAt = Date.now();
    return nextState;
}

function persistStateSnapshot(nextState = state) {
    state = normalizeState(touchState(nextState));
    persistLocalState(state);
    if (syncManager && !suppressCloudSync) {
        syncManager.scheduleSave();
    }
}

function applyRemoteState(nextState) {
    const incomingState = normalizeState(nextState);
    if ((incomingState.lastEditedAt || 0) < (state?.lastEditedAt || 0)) {
        if (syncManager && !suppressCloudSync) {
            syncManager.scheduleSave();
        }
        return;
    }
    suppressCloudSync = true;
    try {
        state = incomingState;
        persistLocalState(state);
        renderTabs();
        renderCalculator();
        loadActiveTabData();
        attachGlobalListeners();
    } finally {
        suppressCloudSync = false;
    }
}

async function setupCloudSync() {
    if (!window.createSharedSupabaseSync) {
        setSyncStatus('Онлайн: скрипт синхронизации не загрузился', true);
        return;
    }

    syncManager = window.createSharedSupabaseSync({
        appId: cloudAppId,
        getState: () => cloneState(state),
        applyState: (nextState) => applyRemoteState(nextState),
        persistLocal: (nextState) => persistLocalState(nextState),
        pollMs: 3000,
        saveDebounceMs: 700,
        onStatus: (status, detail) => {
            if (status === 'connecting') setSyncStatus('Онлайн: подключение...');
            if (status === 'dirty') setSyncStatus('Онлайн: есть локальные изменения...');
            if (status === 'saving') setSyncStatus('Онлайн: синхронизация...');
            if (status === 'saved') setSyncStatus('Онлайн: сохранено');
            if (status === 'remote') setSyncStatus('Онлайн: обновлено из облака');
            if (status === 'idle') setSyncStatus('Онлайн: синхронизация активна');
            if (status === 'warn') console.warn('Cloud sync warning:', detail);
            if (status === 'error') {
                console.error('Cloud sync error:', detail);
                setSyncStatus('Онлайн: ошибка синхронизации', true);
            }
        }
    });

    try {
        await syncManager.init();
    } catch (error) {
        console.error('Failed to initialize cloud sync:', error);
        setSyncStatus('Онлайн: таблица Supabase еще не настроена', true);
    }
}

// --- Initialization and State Management ---
async function init() {
    const savedState = localStorage.getItem(sessionKey);
    state = normalizeState(savedState ? JSON.parse(savedState) : createDefaultState());
    renderTabs();
    renderCalculator();
    loadActiveTabData();
    attachGlobalListeners();
    await setupCloudSync();
}

function saveState() {
    saveActiveTabData();
    persistStateSnapshot();
}

function renderTabs() {
    const container = document.getElementById('tabs-container');
    const addButton = document.getElementById('btn-add-tab');
    const hiddenWrap = document.getElementById('hidden-tabs-wrap');
    container.innerHTML = '';
    state.tabs.filter(tab => !tab.hidden).forEach(tab => {
        const tabEl = document.createElement('div');
        tabEl.className = `tab ${tab.id === state.activeTabId ? 'active' : ''} ${tab?.data?.done ? 'tab-done' : ''}`.trim();

        const tabName = document.createElement('span');
        tabName.className = 'tab-title';
        tabName.textContent = tab.name;
        tabName.title = 'Двойной клик, чтобы переименовать вкладку';
        tabName.ondblclick = (e) => {
            e.stopPropagation();
            startTabRename(tab, tabName);
        };
        tabName.onblur = () => {
            return finishTabRename(tab, tabName, true);
            tabName.contentEditable = false;
            tab.name = tabName.textContent.trim() || tab.name || 'Вывеска';
            tabName.textContent = tab.name;
            saveState();
        };
        tabName.onkeydown = (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                finishTabRename(tab, tabName, true);
            }
            if (e.key === 'Escape') {
                e.preventDefault();
                tabName.textContent = tab.name;
                finishTabRename(tab, tabName, false);
            }
        };

        tabEl.appendChild(tabName);
        tabEl.onclick = (e) => {
            if (tabName.isContentEditable || e.target.closest('.tab-action')) return;
            switchTab(tab.id);
        };

        const actions = document.createElement('span');
        actions.className = 'tab-actions';

        const hideBtn = document.createElement('button');
        hideBtn.type = 'button';
        hideBtn.className = 'tab-action tab-hide-btn';
        hideBtn.innerHTML = iconMarkup('hide');
        hideBtn.title = 'Скрыть вкладку';
        hideBtn.onclick = (e) => { e.stopPropagation(); hideTab(tab.id); };

        const copyBtn = document.createElement('button');
        copyBtn.type = 'button';
        copyBtn.className = 'tab-action tab-copy-btn';
        copyBtn.innerHTML = iconMarkup('copy');
        copyBtn.title = 'Скопировать вкладку';
        copyBtn.onclick = (e) => { e.stopPropagation(); copyTab(tab.id); };

        const doneBtn = document.createElement('button');
        doneBtn.type = 'button';
        doneBtn.className = 'tab-action tab-done-btn';
        doneBtn.innerHTML = iconMarkup('done');
        doneBtn.title = tab?.data?.done ? 'Снять отметку готово' : 'Отметить вкладку как готовую';
        doneBtn.onclick = (e) => { e.stopPropagation(); toggleTabDone(tab.id); };

        const closeBtn = document.createElement('button');
        closeBtn.type = 'button';
        closeBtn.className = 'tab-action tab-delete-btn';
        closeBtn.innerHTML = iconMarkup('trash');
        closeBtn.title = 'Удалить вкладку';
        closeBtn.onclick = (e) => { e.stopPropagation(); deleteTab(tab.id); };

        actions.appendChild(hideBtn);
        actions.appendChild(copyBtn);
        actions.appendChild(doneBtn);
        actions.appendChild(closeBtn);
        tabEl.appendChild(actions);
        container.appendChild(tabEl);
    });
    container.appendChild(addButton);

    const hiddenTabs = state.tabs.filter(tab => tab.hidden);
    hiddenWrap.innerHTML = '';
    hiddenWrap.style.display = hiddenTabs.length ? 'flex' : 'none';
    if (!hiddenTabs.length) return;

    const label = document.createElement('div');
    label.className = 'hidden-tabs-label';
    label.textContent = 'Скрытые вкладки:';
    hiddenWrap.appendChild(label);

    const select = document.createElement('select');
    select.className = 'form-select form-select-sm hidden-tabs-select';

    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = 'Выберите скрытую вкладку';
    select.appendChild(placeholder);

    hiddenTabs.forEach(tab => {
        const option = document.createElement('option');
        option.value = tab.id;
        option.textContent = tab.name;
        select.appendChild(option);
    });

    const showBtn = document.createElement('button');
    showBtn.type = 'button';
    showBtn.className = 'btn btn-sm btn-outline-primary';
    showBtn.textContent = 'Показать';
    showBtn.disabled = true;
    showBtn.onclick = () => {
        if (!select.value) return;
        showTab(select.value);
    };

    select.onchange = () => {
        showBtn.disabled = !select.value;
    };

    hiddenWrap.appendChild(select);
    hiddenWrap.appendChild(showBtn);
    return;

    hiddenTabs.forEach(tab => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-sm btn-outline-secondary hidden-tab-btn';
        btn.textContent = tab.name;
        btn.onclick = () => showTab(tab.id);
        hiddenWrap.appendChild(btn);
    });
}

function startTabRename(tab, tabName) {
    if (tabName.isContentEditable) return;
    tabName.dataset.originalName = tab.name;
    tabName.contentEditable = true;
    tabName.classList.add('editing');
    requestAnimationFrame(() => {
        tabName.focus();
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(tabName);
        selection.removeAllRanges();
        selection.addRange(range);
    });
}

function finishTabRename(tab, tabName, shouldSave) {
    if (!tabName.isContentEditable) return;
    const fallbackName = tabName.dataset.originalName || tab.name || 'Вывеска';
    const nextName = shouldSave ? (tabName.textContent.trim() || fallbackName) : fallbackName;
    tabName.contentEditable = false;
    tabName.classList.remove('editing');
    tabName.textContent = nextName;
    tab.name = nextName;
    delete tabName.dataset.originalName;
    if (shouldSave) {
        saveState();
    }
}

function addTab() {
    saveActiveTabData();
    const newTabId = `tab${state.nextTabNum++}`;
    state.tabs.push({ id: newTabId, name: `Вывеска ${state.tabs.length + 1}`, data: createTabData(), hidden: false });
    state.activeTabId = newTabId;
    persistStateSnapshot();
    renderTabs();
    loadActiveTabData();
}

function getCopyTabName(baseName) {
    const copyBaseName = `${baseName || 'Вывеска'} копия`;
    let nextName = copyBaseName;
    let copyIndex = 2;
    while (state.tabs.some(tab => tab.name === nextName)) {
        nextName = `${copyBaseName} ${copyIndex++}`;
    }
    return nextName;
}

function copyTab(tabId) {
    saveActiveTabData();
    const sourceIndex = state.tabs.findIndex(tab => tab.id === tabId);
    if (sourceIndex === -1) return;

    const sourceTab = state.tabs[sourceIndex];
    const newTabId = `tab${state.nextTabNum++}`;
    const newTab = {
        id: newTabId,
        name: getCopyTabName(sourceTab.name),
        data: cloneState(sourceTab.data || {}),
        hidden: false
    };

    state.tabs.splice(sourceIndex + 1, 0, newTab);
    state.activeTabId = newTabId;
    persistStateSnapshot();
    renderTabs();
    loadActiveTabData();
}

function hideTab(tabId) {
    const visibleTabs = state.tabs.filter(tab => !tab.hidden);
    if (visibleTabs.length <= 1) {
        alert('Нельзя скрыть последнюю видимую вкладку.');
        return;
    }

    saveActiveTabData();
    const tab = state.tabs.find(item => item.id === tabId);
    if (!tab) return;
    tab.hidden = true;
    if (state.activeTabId === tabId) {
        state.activeTabId = state.tabs.find(item => !item.hidden && item.id !== tabId)?.id || state.activeTabId;
    }
    persistStateSnapshot();
    renderTabs();
    loadActiveTabData();
}

function toggleTabDone(tabId) {
    saveActiveTabData();
    const tab = state.tabs.find((item) => item.id === tabId);
    if (!tab) return;
    tab.data.done = !tab.data.done;
    persistStateSnapshot();
    renderTabs();
}

function showTab(tabId) {
    saveActiveTabData();
    const tab = state.tabs.find(item => item.id === tabId);
    if (!tab) return;
    tab.hidden = false;
    state.activeTabId = tab.id;
    persistStateSnapshot();
    renderTabs();
    loadActiveTabData();
}

function deleteTab(tabId) {
    if (state.tabs.length <= 1) { alert("Нельзя удалить последнюю вкладку."); return; }
    if (confirm(`Удалить вкладку "${state.tabs.find(t => t.id === tabId).name}"?`)) {
        saveActiveTabData();
        state.tabs = state.tabs.filter(t => t.id !== tabId);
        state.activeTabId = state.tabs.find(t => !t.hidden)?.id || state.tabs[0].id;
        persistStateSnapshot();
        renderTabs();
        loadActiveTabData();
    }
}

function switchTab(tabId) {
    if (tabId === state.activeTabId) return;
    saveActiveTabData();
    state.activeTabId = tabId;
    persistStateSnapshot();
    renderTabs();
    loadActiveTabData();
}

function saveActiveTabData() {
    const activeTab = state.tabs.find(t => t.id === state.activeTabId);
    if (!activeTab) return;
    activeTab.data = createTabData(activeTab.data);
    syncCatalogFromDom(activeTab);
    activeTab.data.quantities = {};
    document.querySelectorAll('.quantity-input').forEach(input => {
        const value = parseFloat(input.value);
        if (value > 0) activeTab.data.quantities[input.dataset.id] = value;
    });
    activeTab.data.params = {
        width: document.getElementById('param-width').value,
        height: document.getElementById('param-height').value,
        cutting: document.getElementById('param-cutting').value,
        milling: document.getElementById('param-milling').value,
        soldering: document.getElementById('param-soldering').value,
    };
    activeTab.data.coeffs = {
        goods: document.getElementById('coeff-goods').value,
        design: document.getElementById('coeff-design').value,
        assembly: document.getElementById('coeff-assembly').value,
        montage: document.getElementById('coeff-montage').value,
    };
    activeTab.data.notes = document.getElementById('notes').value;
}

function loadActiveTabData() {
    const activeTab = state.tabs.find(t => t.id === state.activeTabId);
    const data = activeTab ? createTabData(activeTab.data) : createTabData();
    if (activeTab) activeTab.data = data;
    document.querySelectorAll('.quantity-input').forEach(input => input.value = '');
    if (data.quantities) {
        for (const id in data.quantities) {
            const input = document.querySelector(`.quantity-input[data-id="${id}"]`);
            if (input) input.value = data.quantities[id];
        }
    }
    const params = data.params || {};
    document.getElementById('param-width').value = params.width || '';
    document.getElementById('param-height').value = params.height || '';
    document.getElementById('param-cutting').value = params.cutting || '';
    document.getElementById('param-milling').value = params.milling || '';
    document.getElementById('param-soldering').value = params.soldering || '';
    const coeffs = data.coeffs || { goods: 2.2, design: 4.5, assembly: 4.2, montage: 2.0 };
    document.getElementById('coeff-goods').value = coeffs.goods;
    document.getElementById('coeff-design').value = coeffs.design;
    document.getElementById('coeff-assembly').value = coeffs.assembly;
    document.getElementById('coeff-montage').value = coeffs.montage;
    document.getElementById('notes').value = data.notes || '';
    calculate();
}

function renderCalculator() {
    const container = document.getElementById('calculator-container');
    const catalog = getActiveCatalog();
    container.innerHTML = `
        <div class="catalog-toolbar">
            <div>
                <button type="button" class="btn btn-sm btn-outline-dark" id="catalog-add-item">+ Добавить товар</button>
            </div>
            <div class="toolbar-field">
                <label class="form-label mb-1">Скрытые товары</label>
                <div class="d-flex gap-2">
                    <select class="form-select form-select-sm" id="hidden-items-select">
                        <option value="">Выберите скрытый товар</option>
                        ${catalog.filter((item) => item.hidden && !item.deleted).map((item) => `<option value="${item.id}">${escapeHtml(item.name)}</option>`).join('')}
                    </select>
                    <button type="button" class="btn btn-sm btn-outline-primary" id="catalog-show-item">Показать</button>
                </div>
            </div>
            <div class="toolbar-note">Измененные цены и новые товары теперь сохраняются внутри каждой вкладки отдельно.</div>
        </div>
    `;
    let currentCategory = '', currentSubcategory = '';
    const header = `<div class="item-row item-row-header" style="grid-template-columns: 80px 1fr 90px 40px 80px 110px 70px;"><span>Артикул</span><span>Название</span><span>Цена (закуп)</span><span>Ед.</span><span>Кол-во</span><span>Розница</span><span class="text-end">Действия</span></div>`;

    catalog.filter((item) => !item.hidden && !item.deleted).forEach(item => {
        if (item.category !== currentCategory) { currentCategory = item.category; container.innerHTML += `<h4 class="mt-4">${currentCategory}</h4>`; }
        if (item.subcategory !== currentSubcategory) {
            currentSubcategory = item.subcategory;
            let subHeader = `<div class="category-header">${currentSubcategory}`;
            if (item.subcategory === 'Блок питания') subHeader += ` (Требуемая мощность: <span id="required-power-display">0</span>W)`;
            subHeader += `</div>`;
            container.innerHTML += subHeader;
            container.innerHTML += header;
        }
        
        container.innerHTML += `
            <div class="item-row" id="row-${item.id}" data-item-id="${item.id}" style="grid-template-columns: 80px 1fr 90px 40px 80px 110px 70px;">
                <span class="small text-muted">${item.id}</span>
                <span class="small">${item.name}</span>
                <input type="number" step="0.01" class="form-control form-control-sm cost-input" value="${item.cost}">
                <span class="small text-center">${item.unit}</span>
                <input type="number" step="0.01" class="form-control form-control-sm quantity-input ${item.auto ? 'read-only' : ''}" data-id="${item.id}">
                <input type="text" class="form-control form-control-sm retail-price" readonly>
                <div class="item-actions">
                    <button type="button" class="item-action item-action-hide" data-item-hide="${item.id}" title="Скрыть товар"${CRITICAL_AUTO_IDS.has(item.id) ? ' disabled' : ''}>${iconMarkup('hide')}</button>
                    <button type="button" class="item-action item-action-delete" data-item-delete="${item.id}" title="Удалить товар"${CRITICAL_AUTO_IDS.has(item.id) ? ' disabled' : ''}>${iconMarkup('trash')}</button>
                </div>
            </div>`;
    });
}

function attachGlobalListeners() {
    const inputs = document.querySelectorAll('.cost-input, .quantity-input, #param-width, #param-height, #param-cutting, #param-milling, #param-soldering, #coeff-goods, #coeff-assembly, #coeff-design, #coeff-montage');
    inputs.forEach(el => {
        el.addEventListener('input', calculate);
        el.addEventListener('change', calculate);
        el.addEventListener('blur', saveState);
    });
    const textareas = document.querySelectorAll('#notes');
    textareas.forEach(el => el.addEventListener('input', saveState));
    const addItemBtn = document.getElementById('catalog-add-item');
    if (addItemBtn) {
        addItemBtn.addEventListener('click', addCatalogItem);
    }
    const showItemBtn = document.getElementById('catalog-show-item');
    if (showItemBtn) {
        showItemBtn.addEventListener('click', showSelectedHiddenItem);
    }
    document.querySelectorAll('[data-item-hide]').forEach((button) => {
        button.addEventListener('click', () => hideCatalogItem(button.dataset.itemHide));
    });
    document.querySelectorAll('[data-item-delete]').forEach((button) => {
        button.addEventListener('click', () => deleteCatalogItem(button.dataset.itemDelete));
    });
}

window.addEventListener('beforeunload', saveState);

function showSelectedHiddenItem() {
    const select = document.getElementById('hidden-items-select');
    if (!select?.value) return;
    const activeTab = getActiveTab();
    if (!activeTab) return;
    const item = activeTab.data.catalog.find((entry) => entry.id === select.value);
    if (!item) return;
    item.hidden = false;
    persistStateSnapshot();
    renderCalculator();
    loadActiveTabData();
    attachGlobalListeners();
}

function hideCatalogItem(itemId) {
    const activeTab = getActiveTab();
    if (!activeTab) return;
    const item = activeTab.data.catalog.find((entry) => entry.id === itemId);
    if (!item) return;
    item.hidden = true;
    activeTab.data.quantities[itemId] = 0;
    persistStateSnapshot();
    renderCalculator();
    loadActiveTabData();
    attachGlobalListeners();
}

function deleteCatalogItem(itemId) {
    const activeTab = getActiveTab();
    if (!activeTab) return;
    const item = activeTab.data.catalog.find((entry) => entry.id === itemId);
    if (!item) return;
    if (!confirm(`Удалить товар "${item.name}" из этой вкладки?`)) return;
    item.deleted = true;
    item.hidden = true;
    delete activeTab.data.quantities[itemId];
    persistStateSnapshot();
    renderCalculator();
    loadActiveTabData();
    attachGlobalListeners();
}

function addCatalogItem() {
    const activeTab = getActiveTab();
    if (!activeTab) return;
    const name = prompt('Название нового товара');
    if (!name) return;
    const category = prompt('Категория товара', 'Материалы');
    if (!category) return;
    const subcategory = prompt('Подкатегория', 'Прочее');
    if (!subcategory) return;
    const unit = prompt('Единица измерения', 'шт');
    if (!unit) return;
    const cost = Number(prompt('Закупочная цена', '0') || 0);
    const pricingPrompt = ITEM_PRICING_OPTIONS.map((item) => `${item.key} — ${item.label}`).join('\n');
    const pricingKind = (prompt(`Логика расчета:\n${pricingPrompt}`, inferPricingKind({ category, subcategory })) || '').trim().toLowerCase();
    const safePricingKind = ITEM_PRICING_OPTIONS.some((item) => item.key === pricingKind) ? pricingKind : 'goods';
    const newItem = {
        id: `CUSTOM_${Date.now()}`,
        name: name.trim(),
        category: category.trim(),
        subcategory: subcategory.trim(),
        unit: unit.trim(),
        cost: Number(cost) || 0,
        hidden: false,
        deleted: false,
        custom: true,
        pricingKind: safePricingKind
    };
    activeTab.data.catalog.push(newItem);
    persistStateSnapshot();
    renderCalculator();
    loadActiveTabData();
    attachGlobalListeners();
}

function calculate() {
    let summary = { goods: 0, design: 0, assembly: 0, mounting: 0, total: 0, payMaster: 0, payInstaller: 0, payDesigner: 0 };
    const coeffs = {
        goods: parseFloat(document.getElementById('coeff-goods').value) || 0,
        design: parseFloat(document.getElementById('coeff-design').value) || 0,
        assembly: parseFloat(document.getElementById('coeff-assembly').value) || 0,
        montage: parseFloat(document.getElementById('coeff-montage').value) || 0,
    };
    
    // Auto-set params
    const catalog = getActiveCatalog().filter((item) => !item.hidden && !item.deleted);
    const solderingCount = parseFloat(document.getElementById('param-soldering').value) || 0;
    const autoMap = {
        SUB01: ((parseFloat(document.getElementById('param-width').value) || 0) / 100 * (parseFloat(document.getElementById('param-height').value) || 0) / 100).toFixed(3),
        WORK02: parseFloat(document.getElementById('param-cutting').value) || 0,
        WORK03: parseFloat(document.getElementById('param-milling').value) || 0,
        WORK05: solderingCount,
        '750641': (solderingCount * 0.15).toFixed(2)
    };
    Object.entries(autoMap).forEach(([itemId, value]) => {
        const input = document.querySelector(`.quantity-input[data-id="${itemId}"]`);
        if (input) input.value = value;
    });
    
    let totalNeonLength = catalog.filter(i => i.power).reduce((sum, neon) => sum + (parseFloat(document.querySelector(`.quantity-input[data-id="${neon.id}"]`)?.value) || 0), 0);
    const work06Input = document.querySelector('.quantity-input[data-id="WORK06"]');
    if (work06Input) work06Input.value = totalNeonLength.toFixed(2);
    
    const requiredPower = totalNeonLength * 10 * 1.4;
    const powerDisplay = document.getElementById('required-power-display');
    if (powerDisplay) powerDisplay.textContent = requiredPower.toFixed(1);

    catalog.forEach(item => {
        const row = document.getElementById(`row-${item.id}`);
        if (!row) return;
        const quantity = parseFloat(row.querySelector('.quantity-input').value) || 0;
        const currentCost = parseFloat(row.querySelector('.cost-input').value) || 0;
        const costPrice = currentCost * quantity;
        
        let retailPrice = 0;
        
        if (quantity > 0) {
            if (item.pricingKind === 'goods') {
                retailPrice = costPrice * coeffs.goods;
                summary.goods += retailPrice;
            } else if (item.pricingKind === 'design') {
                retailPrice = costPrice * coeffs.design;
                summary.design += retailPrice;
                summary.payDesigner += costPrice;
            } else if (item.pricingKind === 'assembly') {
                retailPrice = costPrice * coeffs.assembly;
                summary.assembly += retailPrice;
                summary.payMaster += costPrice;
            } else if (item.pricingKind === 'montage') {
                const coeff = item.coeff === 1 ? 1 : coeffs.montage;
                retailPrice = costPrice * coeff;
                summary.mounting += retailPrice;
                summary.payInstaller += costPrice;
            } else {
                retailPrice = costPrice;
                summary.goods += retailPrice;
            }
        }
        row.querySelector('.retail-price').value = quantity ? Math.round(retailPrice) + ' ₽' : '';
    });

    summary.total = summary.goods + summary.design + summary.assembly + summary.mounting;
    const signCost = summary.goods + summary.design + summary.assembly;
    
    document.getElementById('summary-sign').textContent = `${Math.round(signCost)} ₽`;
    document.getElementById('summary-mounting').textContent = `${Math.round(summary.mounting)} ₽`;
    document.getElementById('summary-total').textContent = `${Math.round(summary.total)} ₽`;
    document.getElementById('summary-goods').textContent = `${Math.round(summary.goods)} ₽`;
    document.getElementById('summary-design').textContent = `${Math.round(summary.design)} ₽`;
    document.getElementById('summary-assembly').textContent = `${Math.round(summary.assembly)} ₽`;
    document.getElementById('summary-pay-master').textContent = `${Math.round(summary.payMaster)} ₽`;
    document.getElementById('summary-pay-installer').textContent = `${Math.round(summary.payInstaller)} ₽`;
    document.getElementById('summary-pay-designer').textContent = `${Math.round(summary.payDesigner)} ₽`;
    
    const width = document.getElementById('param-width').value;
    const height = document.getElementById('param-height').value;
    let offerText = `Размер: ${width}х${height} см (ширина х высота)\n`;
    offerText += `Стоимость вывески: ${Math.round(signCost)} р.\n`;
    if (summary.mounting > 0) offerText += `Стоимость монтажа: ${Math.round(summary.mounting)} р.\n\n`;
    offerText += `Итого: ${Math.round(summary.total)} р.\n\n`;
    offerText += `Срок производства вывески 1-3 рабочих дня с момента оплаты.\n\n`;
    offerText += `Способы оплаты:\n- по счету для юр. лиц.\n- СБП по QR коду\n\n`;
    offerText += `Для оформления заказа, выберите способ оплаты. Если остались вопросы, задавайте.`;
    document.getElementById('client-offer').value = offerText;
    
    saveState();
}

document.addEventListener('DOMContentLoaded', () => { init(); });
</script>
